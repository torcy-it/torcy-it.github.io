<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Tuo Nome] - Developer Portfolio</title>
    <style>
        /* Stile moderno e professionale Apple-like */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.5;
            padding: 60px 20px;
        }
        .portfolio-container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 8px; }
        p.subtitle { font-size: 1.2rem; color: #86868b; }
        .section-title {
            font-size: 1.5rem; font-weight: 600; margin-bottom: 24px;
            border-bottom: 1px solid #d2d2d7; padding-bottom: 12px;
        }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        
        /* Stile della scheda */
        .project-card {
            background: #ffffff; border-radius: 18px; padding: 30px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.05); transition: transform 0.2s ease;
        }
        .project-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .project-tag {
            display: inline-block; background: #e8f5e9; color: #2e7d32;
            padding: 6px 10px; border-radius: 8px; font-size: 0.75rem;
            font-weight: 600; margin-bottom: 16px; text-transform: uppercase;
        }
        .project-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 10px; }
        .project-desc { color: #515154; margin-bottom: 24px; font-size: 0.95rem; }
        
        /* Bottone moderno */
        .project-link {
            display: inline-block; background-color: #0071e3; color: #ffffff;
            text-decoration: none; padding: 12px 20px; border-radius: 20px;
            font-size: 0.9rem; font-weight: 600; transition: background-color 0.2s;
        }
        .project-link:hover { background-color: #0077ED; }
    </style>
</head>
<body>

    <div class="portfolio-container">
        <header>
            <h1>[Tuo Nome e Cognome]</h1>
            <p class="subtitle">iOS Developer & App Creator</p>
        </header>

        <main>
            <h2 class="section-title">Featured Projects</h2>
            <div class="projects-grid">
                
                <article class="project-card">
                    <span class="project-tag">WatchOS Game</span>
                    <h3 class="project-title">One, Two, Three</h3>
                    <p class="project-desc">A fast-paced, 8-bit inspired card game designed exclusively for your wrist. Experience retro arcade graphics and quick gameplay directly on your Apple Watch.</p>
                    
                    <a href="one-two-three/" class="project-link">View Project Website</a>
                </article>

            </div>
        </main>
    </div>

</body>
</html>
